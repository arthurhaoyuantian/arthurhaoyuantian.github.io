<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale-1.0">

        <title>arthur's portfolio ★ circa apr. 2026</title>

        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <!-- HEADER BLOCK -->
        <div class="forum-wrapper">
            <style>
                .forum-header {
                    background-image: url('static/gallery/suzhou1.jpg');
                    background-size: cover;
                    background-position: center;
                    padding: 30px;
                    border-bottom: 6px solid #fff892cc;
                    text-align: center;
                }
            </style>

            <div class="forum-header">
                <h1>Arthur's Portfolio</h1>
                <p>photo gallery!</p>
            </div>

            <!-- WEBSITE PAGES -->
            <div class="tab-bar">
                <a href="index.html" class="tab">🏡 Main Base</a>
                <a href="experience.html" class="tab">💼 Experience</a>
                <a href="projects.html" class="tab">🛠️ Projects</a>
                <a href="photography.html" class="tab active">📷 Photography</a>
            </div>

            <!-- photos! -->
             <div id="photography" class="page">
                <div class="corkboard">
                    
                    <div class="polaroid">
                        <img src="static/gallery/cat1.jpg" alt="photo description">
                        <div class="caption">cat on huang shan</div>
                    </div>
                    
                    <div class="polaroid">
                        <img src="static/gallery/strip.jpg" alt="photo description">
                        <div class="caption">hiking trail in chengdu</div>
                    </div>
                    
                    <div class="polaroid">
                        <img src="static/gallery/chengdu1.jpg" alt="photo description">
                        <div class="caption">one of my favs</div>
                    </div>
                    
                    <!-- add as many as you want -->
                    
                </div>
            </div>
        </div>
        
            <script>
                const polaroids = document.querySelectorAll('.polaroid');
                
                polaroids.forEach(polaroid => {
                    // random rotation between -4 and 4 degrees
                    const randomRotate = (Math.random() * 8) - 4;
                    polaroid.style.transform = `rotate(${randomRotate}deg)`;
                    
                    // random slight vertical offset
                    const randomY = (Math.random() * 10) - 5;
                    polaroid.style.marginTop = `${randomY}px`;
                });
            </script>

            <script>
                // create the lightbox overlay
                const lightbox = document.createElement('div');
                lightbox.id = 'lightbox';
                lightbox.innerHTML = `
                    <div class="lightbox-content">
                        <img id="lightbox-img" src="">
                        <span class="close-btn">&times;</span>
                    </div>
                `;
                document.body.appendChild(lightbox);
                
                // get all polaroid images
                const images = document.querySelectorAll('.polaroid img');
                const lightboxImg = document.getElementById('lightbox-img');
                const closeBtn = document.querySelector('.close-btn');
                
                images.forEach(img => {
                    img.addEventListener('click', function(e) {
                        e.preventDefault();
                        lightboxImg.src = this.src;
                        lightbox.classList.add('active');
                    });
                });
                
                closeBtn.addEventListener('click', () => {
                    lightbox.classList.remove('active');
                });
                
                lightbox.addEventListener('click', (e) => {
                    if (e.target === lightbox) {
                        lightbox.classList.remove('active');
                    }
                });
            </script>
    </body>
</html>
